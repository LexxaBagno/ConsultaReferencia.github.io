<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consulta de Preços</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; font-size: 22px; }
        
        /* Janela da Câmera */
        #interactive.viewport { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; display: none; position: relative; border: 2px solid #1a73e8; }
        #interactive video, #interactive canvas { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-scan { background: #28a745; color: white; width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #1a73e8; }
        .btn-search { background: #1a73e8; color: white; border: none; padding: 0 18px; border-radius: 10px; cursor: pointer; font-size: 18px; }

        .result-box { border-top: 1px solid #eee; padding-top: 20px; display: none; text-align: left; }
        .prod-title { font-weight: bold; color: #333; margin-bottom: 8px; font-size: 18px; line-height: 1.4; }
        .price-area { margin-top: 15px; padding: 20px; background: #f8f9fa; border-radius: 12px; text-align: center; }
        .old-price { text-decoration: line-through; color: #888; font-size: 15px; margin-bottom: 5px; display: block; }
        .new-price { font-size: 34px; color: #2e7d32; font-weight: bold; display: block; }
        
        /* Estilo da frase de desconto solicitada */
        .discount-label { background: #fff3e0; color: #e65100; padding: 10px 15px; border-radius: 10px; font-size: 15px; font-weight: bold; margin-top: 12px; display: inline-block; border: 1px solid #ffe0b2; }
        
        .error { color: #d32f2f; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Consulta de Produto</h2>
    
    <button class="btn-scan" id="btnToggle" onclick="toggleScanner()">
        <span>📷 LER CÓDIGO (SCANNER)</span>
    </button>
    
    <div id="interactive" class="viewport"></div>

    <div class="search-row">
        <input type="text" id="skuInput" placeholder="Digite a Referência..." onkeyup="if(event.key==='Enter') buscar()">
        <button class="btn-search" onclick="buscar()">🔍</button>
    </div>

    <div id="error" class="error" style="display:none">Produto não encontrado!</div>

    <div id="result" class="result-box">
        <div id="prodDesc" class="prod-title"></div>
        <div style="font-size: 15px; color: #555;">Ref: <span id="prodRef" style="font-weight: bold; color: #000;"></span></div>
        
        <div class="price-area">
            <div id="precoAntigo" class="old-price"></div>
            <span id="precoAtual" class="new-price"></span>
            <div id="tagDesconto" class="discount-label" style="display:none">🔥 Referencia com 50% de desconto 🔥</div>
        </div>
    </div>
</div>

<script>
    // Dados baseados no seu arquivo CSV
    const estoque = [
        { g: "01.001", d: "MISTURADOR DE COZINHA BICA RETRATIL - BOOLEAN - AÇO ESCOVADO", b: "7898678205451", r: "LX3388NB", v: 2027.86 },
        { g: "01.001", d: "MISTURADOR DE COZINHA BICA RETRATIL - BOOLEAN - CROMADO", b: "7898678205406", r: "LX3388", v: 1848.94 },
        { g: "06.007", d: "CUBA CERAMICA REDONDA 36X36X12,5 - ROSE GOLD", b: "7898678205345", r: "LX524RG", v: 1007.25 },
        { g: "06.007", d: "CUBA CERAMICA REDONDA 37X37X15,5 - BRANCA", b: "7898678204744", r: "LX025", v: 371.73 },
        { g: "06.007", d: "CUBA CERAMICA REDONDA DUAS CORES - PRETO E ROSE GOLD", b: "7898678205987", r: "LX524BRG", v: 1088.29 }
    ];

    function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function buscar(codigo = null) {
        const termo = codigo || document.getElementById('skuInput').value.trim().toUpperCase();
        if(!termo) return;

        // Pesquisa por referência ou por EAN (o EAN funciona, mas não aparece no ecrã)
        const p = estoque.find(i => i.r.toUpperCase() === termo || i.b === termo);

        if(p) {
            if(scannerAtivo) toggleScanner(); // Fecha a câmera se encontrar o produto
            document.getElementById('error').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('prodDesc').innerText = p.d;
            document.getElementById('prodRef').innerText = p.r;

            let final = p.v;
            // Regra do Grupo 06
            if(p.g.startsWith("06")) {
                final = p.v * 0.5;
                document.getElementById('precoAntigo').innerText = "De: " + formatar(p.v);
                document.getElementById('tagDesconto').style.display = 'inline-block';
            } else {
                document.getElementById('precoAntigo').innerText = '';
                document.getElementById('tagDesconto').style.display = 'none';
            }
            document.getElementById('precoAtual').innerText = formatar(final);
            document.getElementById('skuInput').value = ""; 
        } else {
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }
    }

    let scannerAtivo = false;
    function toggleScanner() {
        const viewer = document.getElementById('interactive');
        const btn = document.getElementById('btnToggle');
        if (!scannerAtivo) {
            viewer.style.display = 'block';
            btn.innerHTML = "<span>❌ FECHAR CÂMERA</span>";
            btn.style.background = "#666";
            Quagga.init({
                inputStream: { 
                    name: "Live", 
                    type: "LiveStream", 
                    target: viewer, 
                    constraints: { facingMode: "environment" } 
                },
                decoder: { readers: ["ean_reader", "code_128_reader", "upc_reader", "ean_8_reader"] }
            }, function(err) {
                if (err) { alert("Erro ao aceder à câmera."); return; }
                Quagga.start();
                scannerAtivo = true;
            });
            Quagga.onDetected((res) => { 
                if(res.codeResult.code) {
                    // Feedback tátil (vibração) se disponível no telemóvel
                    if(navigator.vibrate) navigator.vibrate(100);
                    buscar(res.codeResult.code); 
                }
            });
        } else {
            Quagga.stop();
            viewer.style.display = 'none';
            btn.innerHTML = "<span>📷 LER CÓDIGO (SCANNER)</span>";
            btn.style.background = "#28a745";
            scannerAtivo = false;
        }
    }
</script>
</body>
</html>
