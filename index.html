<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consulta de Preços Ultra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; box-sizing: border-box; }
        
        /* Container da Câmera Melhorado */
        #interactive.viewport { 
            width: 100%; height: 300px; border-radius: 12px; overflow: hidden; 
            background: #000; margin-bottom: 15px; display: none; position: relative; 
            border: 3px solid #1a73e8; 
        }
        #interactive video, #interactive canvas { width: 100%; height: 100%; object-fit: cover; }
        
        /* Mira do Scanner */
        .scanner-laser {
            position: absolute; top: 50%; left: 10%; right: 10%; height: 2px;
            background-color: red; box-shadow: 0 0 8px red; z-index: 10;
            transform: translateY(-50%); display: none;
        }

        .btn-scan { background: #28a745; color: white; width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; font-size: 16px; }
        .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn-search { background: #1a73e8; color: white; border: none; padding: 0 18px; border-radius: 10px; cursor: pointer; }

        .result-box { border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .prod-title { font-weight: bold; color: #333; font-size: 18px; }
        .price-area { margin-top: 15px; padding: 20px; background: #f8f9fa; border-radius: 12px; text-align: center; }
        .new-price { font-size: 34px; color: #2e7d32; font-weight: bold; display: block; }
        
        /* Frase com Foguinho */
        .discount-label { 
            background: #fff3e0; color: #e65100; padding: 10px; border-radius: 10px; 
            font-size: 15px; font-weight: bold; margin-top: 12px; display: inline-block; 
            border: 1px solid #ffe0b2; 
        }
        .error { color: #d32f2f; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <button class="btn-scan" id="btnToggle" onclick="toggleScanner()">📷 ABRIR SCANNER MELHORADO</button>
    
    <div id="interactive" class="viewport">
        <div class="scanner-laser" id="laser"></div>
    </div>

    <div class="search-row">
        <input type="text" id="skuInput" placeholder="Digite a Referência..." onkeyup="if(event.key==='Enter') buscar()">
        <button class="btn-search" onclick="buscar()">🔍</button>
    </div>

    <div id="error" class="error" style="display:none">Produto não encontrado!</div>

    <div id="result" class="result-box">
        <div id="prodDesc" class="prod-title"></div>
        <div style="font-size: 15px; color: #555; margin-top:5px;">Ref: <span id="prodRef" style="font-weight:bold;"></span></div>
        <div class="price-area">
            <div id="precoAntigo" style="text-decoration:line-through; color: #888; font-size:14px;"></div>
            <span id="precoAtual" class="new-price"></span>
            <div id="tagDesconto" class="discount-label" style="display:none">🔥 Referencia com 50% de desconto 🔥</div>
        </div>
    </div>
</div>

<script>
    const estoque = [
        { g: "01.001", d: "MISTURADOR DE COZINHA BICA RETRATIL - BOOLEAN", b: "7898678205451", r: "LX3388NB", v: 2027.86 },
        { g: "06.007", d: "CUBA CERAMICA REDONDA 36X36X12,5 - ROSE GOLD", b: "7898678205345", r: "LX524RG", v: 1007.25 }
    ];

    function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function buscar(codigo = null) {
        const termo = codigo || document.getElementById('skuInput').value.trim().toUpperCase();
        if(!termo) return;
        const p = estoque.find(i => i.r.toUpperCase() === termo || i.b === termo);
        if(p) {
            if(scannerAtivo) toggleScanner();
            document.getElementById('error').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('prodDesc').innerText = p.d;
            document.getElementById('prodRef').innerText = p.r;
            let final = p.v;
            if(p.g.startsWith("06")) {
                final = p.v * 0.5;
                document.getElementById('precoAntigo').innerText = "De: " + formatar(p.v);
                document.getElementById('tagDesconto').style.display = 'inline-block';
            } else {
                document.getElementById('precoAntigo').innerText = '';
                document.getElementById('tagDesconto').style.display = 'none';
            }
            document.getElementById('precoAtual').innerText = formatar(final);
        } else {
            document.getElementById('error').style.display = 'block';
        }
    }

    let scannerAtivo = false;
    function toggleScanner() {
        const viewer = document.getElementById('interactive');
        const laser = document.getElementById('laser');
        const btn = document.getElementById('btnToggle');

        if (!scannerAtivo) {
            viewer.style.display = 'block';
            laser.style.display = 'block';
            btn.innerText = "❌ FECHAR";
            
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: viewer,
                    constraints: {
                        width: { min: 1280 },
                        height: { min: 720 },
                        facingMode: "environment",
                        aspectRatio: { min: 1, max: 2 }
                    },
                },
                locator: { patchSize: "medium", halfSample: false }, // Melhora precisão
                numOfWorkers: 4,
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] },
                locate: true // Ajuda a achar o código na imagem
            }, function(err) {
                if (err) { alert("Erro de câmera."); return; }
                Quagga.start();
                scannerAtivo = true;
            });

            Quagga.onDetected((res) => { if(res.codeResult.code) buscar(res.codeResult.code); });
        } else {
            Quagga.stop();
            viewer.style.display = 'none';
            laser.style.display = 'none';
            btn.innerText = "📷 ABRIR SCANNER MELHORADO";
            scannerAtivo = false;
        }
    }
</script>
</body>
</html>
