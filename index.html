<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consulta de Vendas Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --warning: #e65100; }
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        h2 { text-align: center; color: var(--primary); font-size: 20px; margin-bottom: 15px; }
        .field-group { margin-bottom: 12px; }
        label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 4px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; background: #fff; }
        .search-row { display: flex; gap: 8px; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-size: 18px; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: none !important; }
        .btn-scan { background: var(--success); color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; margin-bottom: 15px; cursor: pointer; }
        .group-results-list { border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; max-height: 250px; overflow-y: auto; display: none; background: #f9f9f9; }
        .group-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; line-height: 1.4; }
        .result-box { border-top: 2px solid #eee; padding-top: 15px; margin-top: 10px; display: none; }
        .prod-title { font-weight: bold; color: #333; font-size: 16px; margin-bottom: 10px; line-height: 1.4; }
        .price-card { background: #f8f9fa; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .new-price { font-size: 32px; color: var(--success); font-weight: bold; display: block; margin: 5px 0; }
        .discount-badge { background: #fff3e0; color: var(--warning); padding: 8px; border-radius: 8px; font-size: 14px; font-weight: bold; display: inline-block; border: 1px solid #ffe0b2; width: 100%; box-sizing: border-box; margin-top: 10px; }
        .edit-discount { margin-top: 15px; display: flex; align-items: center; gap: 10px; background: #eef2f7; padding: 10px; border-radius: 8px; }
        .edit-discount input { width: 80px; text-align: center; }
        .error { color: #d32f2f; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>Consulta - LEXXA</h2>
    <div class="field-group">
        <label>Filtrar por Categoria</label>
        <select id="groupSelect">
            <option value="">TODAS AS CATEGORIAS</option>
            <option value="COZINHA">COZINHA</option>
            <option value="BANHEIRO">BANHEIRO</option>
            <option value="OUTLET">OUTLET</option>
            <option value="ACESSORIOS">ACESSÓRIOS</option>
        </select>
    </div>
    <button class="btn-scan" id="scanBtn" onclick="startScanner()">📷 SCANNER</button>
    <div id="reader"></div>
    <div class="search-row">
    <input type="text" id="skuInput" placeholder="Fale ou digite...">
    <button class="btn-search" id="voiceBtn" style="background: #ea4335; border: none; color: white; padding: 10px; border-radius: 8px; margin-right: 5px;">🎤</button>
    <button class="btn-search" id="searchBtn">🔍</button>
</div>
<script src="./script.js"></script>
    <div id="groupResults" class="group-results-list"></div>
    <div id="error" class="error" style="display:none">Não encontrado!</div>
    <div id="result" class="result-box">
        <div id="prodDesc" class="prod-title"></div>
        <div style="font-size:14px; color:#666; margin-bottom:10px;">Ref: <span id="prodRef" style="color:#000"></span></div>
        <div class="price-card">
            <span id="precoAntigo" style="text-decoration:line-through; color:#888; font-size:14px;"></span>
            <span id="precoAtual" class="new-price"></span>
            <div id="tagDesconto" class="discount-badge" style="display:none"></div>
        </div>
        <div class="edit-discount">
            <label style="flex:1">Desconto %:</label>
            <input type="number" id="manualDiscount" value="0">
        </div>
    </div>
</div>
<script src="./script.js"></script>
</body>
</html>
